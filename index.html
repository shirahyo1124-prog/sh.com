<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入居者紹介フォーム</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

h1 {
  text-align: center;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  background: black;
  color: white;
  border: none;
}

.card {
  background: #fff;
  padding: 10px;
  margin-top: 10px;
  border: 1px solid #ddd;
}

.status-未対応 { color: red; }
.status-対応中 { color: orange; }
.status-完了 { color: green; }
</style>
</head>

<body>

<div class="container">

<h1>入居者紹介フォーム</h1>

<h2>入力</h2>

<input id="name" placeholder="名前">
<input id="phone" placeholder="電話番号">
<input id="address" placeholder="住所">

<select id="status">
  <option>未対応</option>
  <option>対応中</option>
  <option>完了</option>
</select>

<button onclick="add()">送信</button>

<h2>一覧</h2>
<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function add() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;
  const status = document.getElementById("status").value;

  if (!name || !phone || !address) {
    alert("全部入力して");
    return;
  }

  data.push({ name, phone, address, status });
  localStorage.setItem("data", JSON.stringify(data));

  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${item.name}</strong><br>
      📞 ${item.phone}<br>
      🏠 ${item.address}<br>
      <span class="status-${item.status}">${item.status}</span><br>
      <button onclick="del(${index})">削除</button>
    `;

    list.appendChild(div);
  });
}

function del(index) {
  data.splice(index, 1);
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

render();

</script>

</body>
</html>
