<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>入居者紹介フォーム</title>

  <!-- アイコン -->
  <link rel="stylesheet" href="https://unpkg.com/ionicons@4.5.10-0/dist/css/ionicons.min.css">

  <!-- 郵便番号→住所自動入力 -->
  <script src="https://yubinbango.github.io/yubinbango-core/yubinbango-core.js"></script>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="box h-adr">
  <h2><i class="ion-ios-home"></i> 入居者紹介フォーム</h2>

  <!-- 郵便番号 -->
  <input type="text" class="p-postal-code" placeholder="郵便番号 (例: 1000001)">

  <!-- 住所 -->
  <input type="text" class="p-region p-locality p-street-address p-extended-address" placeholder="住所">

  <!-- 名前 -->
  <input type="text" id="name" placeholder="名前">

  <!-- 電話番号 -->
  <input type="text" id="phone" placeholder="電話番号">

  <!-- 送信 -->
  <button onclick="sendData()">送信</button>

  <p id="result"></p>
</div>

<script>
function sendData() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  if (!name || !phone) {
    alert("名前と電話番号は必須！");
    return;
  }

  document.getElementById("result").innerText = 
    "送信完了！\n名前：" + name + "\n電話：" + phone;
}
</script>

</body>
</html>
