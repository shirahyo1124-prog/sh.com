<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>案件管理ツール</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
}

.container {
  max-width: 600px;
  margin: auto;
}

input, select, button {
  padding: 10px;
  margin: 5px 0;
  width: 100%;
}

button {
  background: black;
  color: white;
  border: none;
}

.card {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}

.status-未対応 { color: red; }
.status-対応中 { color: orange; }
.status-完了 { color: green; }
</style>

</head>
<body>

<div class="container">

<h1>案件管理</h1>

<h2>案件入力</h2>

<input type="text" id="name" placeholder="名前">
<input type="text" id="content" placeholder="内容">

<select id="status">
  <option>未対応</option>
  <option>対応中</option>
  <option>完了</option>
</select>

<button onclick="addData()">追加</button>

<h2>一覧</h2>
<p id="count"></p>
<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function addData() {
  const name = document.getElementById("name").value;
  const content = document.getElementById("content").value;
  const status = document.getElementById("status").value;

  if (!name || !content) {
    alert("全部入力して");
    return;
  }

  data.push({ name, content, status });
  localStorage.setItem("data", JSON.stringify(data));

  render();
}

function deleteData(index) {
  data.splice(index, 1);
  localStorage.setItem("data", JSON.stringify(data));
  render();
}

function render() {
  const list = document.getElementById("list");
  const count = document.getElementById("count");

  list.innerHTML = "";
  count.textContent = "合計：" + data.length;

  data.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${item.name}</strong><br>
      ${item.content}<br>
      <span class="status-${item.status}">${item.status}</span><br>
      <button onclick="deleteData(${index})">削除</button>
    `;

    list.appendChild(div);
  });
}

render();

</script>

</body>
</html>
